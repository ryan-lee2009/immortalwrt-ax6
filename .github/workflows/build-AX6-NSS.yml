# Redmi AX6-NSS ImmortalWrt 云编译工作流
# 适配GitHub Actions Ubuntu-22.04，修复所有编译报错
name: 为AX6-NSS构建OpenWRT

# 手动触发编译（推荐，避免自动触发冲突）
on:
  workflow_dispatch:

# 环境变量配置（路径严格匹配仓库结构）
env:
  REPO_URL: https://github.com/VIKINGYFY/immortalwrt.git
  REPO_BRANCH: main
  CONFIG_FILE: AX6-IPQ/.config
  DIY_SH: AX6-IPQ/diy.sh
  FILES: AX6-IPQ/FILES
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      # 步骤1：检查服务器配置，提示性能注意事项
      - name: 检查机器配置
        run: |
          echo "警告⚠：云编译服务器性能有限，请勿勾选过多插件！"
          echo "建议取消Node.js/大存储类插件，避免编译崩溃！"
          echo "--------------------------CPU信息--------------------------"
          cat /proc/cpuinfo | grep -E 'model name|physical id' | sort -u
          echo "--------------------------内存信息--------------------------"
          free -h
          echo "--------------------------硬盘信息--------------------------"
          df -hT

      # 步骤2：最大化释放磁盘空间（解决云编译磁盘不足）
      - name: 优化磁盘空间
        uses: hugoalh/disk-space-optimizer-ghaction@v0.8.1
        with:
          operate_sudo: true
          general_include: ".+"
          general_exclude: |-
            ^GCC$
            ^G\+\+$
            clang
            LLVM
          docker_prune: true
          docker_clean: true
          apt_prune: true
          apt_clean: true
          os_swap: true

      # 步骤3：二次释放磁盘空间（双重保障）
      - name: 释放磁盘空间
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 10240
          swap-size-mb: 1024
          remove-dotnet: true
          remove-android: true
          remove-haskell: true
          remove-codeql: true
          remove-docker-images: true

      # 步骤4：检出仓库代码（云编译基础）
      - name: 结账
        uses: actions/checkout@main

      # 步骤5：初始化编译环境（安装依赖）
      - name: 初始化环境
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt-get -qq update -y
          sudo -E apt-get -qq install -y $(curl -fsSL https://raw.githubusercontent.com/nantayo/My-Pkg/master/2305)
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          sudo timedatectl set-timezone "$TZ"
          sudo chown $USER:$GROUPS $GITHUB_WORKSPACE

      # 步骤6：克隆ImmortalWrt源码（适配AX6-NSS）
      - name: 克隆源代码
        run: |
          git clone $REPO_URL -b $REPO_BRANCH openwrt
          ls -l openwrt/

      # 步骤7：缓存编译文件（加速后续编译）
      - name: Cache WRT 构建
        uses: stupidloud/cachewrtbuild@main
        with:
          ccache: true
          mixkey: AX6-NSS-${{ env.REPO_BRANCH }}
          prefix: ${{ github.workspace }}/openwrt

      # 步骤8：加载自定义配置（修复路径判断，容错处理）
      - name: 加载自定义配置
        run: |
          # 仅当文件存在时执行，避免找不到文件报错（核心修复）
          [ -d $FILES ] && mv -f $FILES openwrt/files && echo "自定义FILES已加载"
          [ -f $CONFIG_FILE ] && mv -f $CONFIG_FILE openwrt/.config && echo "自定义.config已加载"
          [ -f $DIY_SH ] && chmod +x $DIY_SH && cd openwrt && $GITHUB_WORKSPACE/$DIY_SH && echo "DIY脚本执行完成"

      # 步骤9：下载编译依赖包（单线程，避免断连）
      - name: 下载包
        working-directory: ./openwrt
        run: |
          make defconfig
          make download -j1
          # 删除空文件，避免编译报错
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      # 步骤10：编译固件（单线程+详细日志，云编译必选，稳定不崩）
      - name: 编译固件
        run: |
          chmod -R 755 openwrt
          cd openwrt
          echo "开始单线程编译AX6-NSS固件，日志将实时输出..."
          make -j1 V=s
          echo "compile_status=成功" >> $GITHUB_ENV

      # 步骤11：复制编译产物（准备上传）
      - name: 复制输出文件
        run: |
          mkdir -p upload
          # 复制AX6专用固件（ubi/bin格式，适配刷机）
          cp -f openwrt/bin/targets/*/*/*.ubi upload/
          cp -f openwrt/bin/targets/*/*/*.bin upload/
          ls -l upload/

      # 步骤12：获取编译时间（作为固件标签）
      - name: 获取当前日期
        run: echo "CURRENT_DATE=$(date '+%Y%m%d%H%M%S')" >> $GITHUB_ENV

      # 步骤13：上传固件到GitHub Release（方便下载）
      - name: 上传OpenWrt固件到发布版
        uses: ncipollo/release-action@main
        with:
          tag: AX6_NSS_${{ env.CURRENT_DATE }}
          artifacts: upload/*
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            基于VIKINGYFY/immortalwrt源码构建（AX6-NSS硬件加速版）
            🔧 编译环境：GitHub Actions Ubuntu-22.04
            ⚡ 核心特性：NSS满血硬件加速，支持OpenClash/PassWall/HomeProxy
            📌 刷机说明：首次使用建议全新刷写，避免保留配置报错
            🔑 路由器信息：
            - IP：192.168.1.1
            - 账户：root
            - 密码：空

      # 步骤14：删除旧固件（保留最新10个，节省仓库空间）
      - name: 删除旧版本
        uses: dev-drprasad/delete-older-releases@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          keep_latest: 10
          delete_tags: true
